<div class="auth-page">
    <div class="auth-container">
        <div class="auth-card card">
            <div class="auth-header">
                <h1>Welcome Back</h1>
                <p>Login to continue your adventure</p>
            </div>

            <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="auth-form">
                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" formControlName="email" placeholder="your@email.com"
                        [class.error]="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
                    <span class="error-message"
                        *ngIf="loginForm.get('email')?.invalid && loginForm.get('email')?.touched">
                        Please enter a valid email
                    </span>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" formControlName="password" placeholder="Enter your password"
                        [class.error]="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
                    <span class="error-message"
                        *ngIf="loginForm.get('password')?.invalid && loginForm.get('password')?.touched">
                        Password must be at least 6 characters
                    </span>
                </div>

                <div class="error-alert" *ngIf="errorMessage">
                    {{ errorMessage }}
                </div>

                <button type="submit" class="btn btn-primary btn-lg" [disabled]="loginForm.invalid || isLoading"
                    style="width: 100%;">
                    <span *ngIf="!isLoading">Login</span>
                    <span *ngIf="isLoading">Logging in...</span>
                </button>
            </form>

            <div class="auth-footer">
                <p>Don't have an account? <a routerLink="/register">Sign up</a></p>
            </div>
        </div>
    </div>
</div>
