<div class="auth-page">
    <div class="auth-container">
        <div class="auth-card card">
            <div class="auth-header">
                <h1>Create Account</h1>
                <p>Join us and start exploring</p>
            </div>

            <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="auth-form">
                <div class="form-group">
                    <label for="name">Full Name</label>
                    <input type="text" id="name" formControlName="name" placeholder="John Doe"
                        [class.error]="registerForm.get('name')?.invalid && registerForm.get('name')?.touched">
                    <span class="error-message"
                        *ngIf="registerForm.get('name')?.invalid && registerForm.get('name')?.touched">
                        Name is required (min 2 characters)
                    </span>
                </div>

                <div class="form-group">
                    <label for="email">Email Address</label>
                    <input type="email" id="email" formControlName="email" placeholder="your@email.com"
                        [class.error]="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
                    <span class="error-message"
                        *ngIf="registerForm.get('email')?.invalid && registerForm.get('email')?.touched">
                        Please enter a valid email
                    </span>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" formControlName="password" placeholder="At least 6 characters"
                        [class.error]="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
                    <span class="error-message"
                        *ngIf="registerForm.get('password')?.invalid && registerForm.get('password')?.touched">
                        Password must be at least 6 characters
                    </span>
                </div>

                <div class="form-group">
                    <label for="role">I want to</label>
                    <select id="role" formControlName="role">
                        <option value="tourist">Book Tours (Tourist)</option>
                        <option value="guide">Offer Tours (Guide)</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="phone">Phone Number (Optional)</label>
                    <input type="tel" id="phone" formControlName="phone" placeholder="+1234567890">
                </div>

                <div *ngIf="isGuide">
                    <div class="form-group">
                        <label for="bio">Bio</label>
                        <textarea id="bio" formControlName="bio" rows="3"
                            placeholder="Tell us about your experience as a guide..."></textarea>
                    </div>

                    <div class="form-group">
                        <label for="languages">Languages (comma-separated)</label>
                        <input type="text" id="languages" formControlName="languages"
                            placeholder="English, Spanish, French">
                    </div>
                </div>

                <div class="error-alert" *ngIf="errorMessage">
                    {{ errorMessage }}
                </div>

                <button type="submit" class="btn btn-primary btn-lg" [disabled]="registerForm.invalid || isLoading"
                    style="width: 100%;">
                    <span *ngIf="!isLoading">Create Account</span>
                    <span *ngIf="isLoading">Creating account...</span>
                </button>
            </form>

            <div class="auth-footer">
                <p>Already have an account? <a routerLink="/login">Login</a></p>
            </div>
        </div>
    </div>
</div>
