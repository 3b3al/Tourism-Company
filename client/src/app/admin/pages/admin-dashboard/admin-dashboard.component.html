<div class="dashboard-header">
    <h1>Dashboard</h1>
</div>

<div *ngIf="loading" class="loading">Loading stats...</div>
<div *ngIf="error" class="error">{{ error }}</div>

<div *ngIf="!loading && !error" class="stats-grid">
    <div class="stat-card">
        <div class="stat-icon">🏝️</div>
        <div class="stat-details">
            <h3>Total Tours</h3>
            <p>{{ stats.totalTours }}</p>
        </div>
    </div>

    <div class="stat-card">
        <div class="stat-icon">📅</div>
        <div class="stat-details">
            <h3>Total Bookings</h3>
            <p>{{ stats.totalBookings }}</p>
        </div>
    </div>

    <div class="stat-card">
        <div class="stat-icon">💰</div>
        <div class="stat-details">
            <h3>Total Revenue</h3>
            <p>{{ stats.totalRevenue | currency }}</p>
        </div>
    </div>

    <div class="stat-card">
        <div class="stat-icon">👥</div>
        <div class="stat-details">
            <h3>Total Users</h3>
            <p>{{ stats.totalUsers }}</p>
        </div>
    </div>
</div>
