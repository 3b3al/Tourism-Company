<div class="page-header">
    <h1>Manage Guides & Users</h1>
</div>

<div *ngIf="loading" class="loading">Loading users...</div>
<div *ngIf="error" class="error">{{ error }}</div>

<div class="table-container" *ngIf="!loading && !error">
    <table class="data-table">
        <thead>
            <tr>
                <th>Name</th>
                <th>Email</th>
                <th>Role</th>
                <th>Joined</th>
                <th>Actions</th>
            </tr>
        </thead>
        <tbody>
            <tr *ngFor="let user of users">
                <td>
                    <div class="user-cell">
                        <img [src]="user.avatar || 'assets/default-avatar.png'" alt="Avatar" class="avatar-thumb">
                        {{ user.name }}
                    </div>
                </td>
                <td>{{ user.email }}</td>
                <td>
                    <span class="badge" [ngClass]="'role-' + user.role">{{ user.role }}</span>
                </td>
                <td>{{ user.createdAt | date:'mediumDate' }}</td>
                <td class="actions">
                    <button *ngIf="user.role === 'tourist'" (click)="toggleRole(user)"
                        class="btn btn-sm btn-info">Promote to Guide</button>
                    <button *ngIf="user.role === 'guide'" (click)="toggleRole(user)"
                        class="btn btn-sm btn-warning">Revoke Guide</button>
                    <button *ngIf="user.role !== 'admin'" (click)="deleteUser(user._id)"
                        class="btn btn-sm btn-danger">Delete</button>
                </td>
            </tr>
            <tr *ngIf="users.length === 0">
                <td colspan="5" class="text-center">No users found.</td>
            </tr>
        </tbody>
    </table>
</div>
